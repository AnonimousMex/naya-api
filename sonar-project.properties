sonar.organization=anonimousmex
sonar.projectKey=AnonimousMex_naya-api
sonar.host.url=https://sonarcloud.io

sonar.sources=app
sonar.python.version=3.11
sonar.sourceEncoding=UTF-8

# Cosas que no aportan al análisis y solo meten ruido
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/migrations/**,grafana/**,prometheus/**,**/*.log,naya_app.log*,**/alembic/versions/**,app/scripts/**

# Si en algún momento corres pytest --cov-report=xml:coverage.xml,
# Sonar usará este archivo automáticamente.
sonar.python.coverage.reportPaths=coverage.xml
