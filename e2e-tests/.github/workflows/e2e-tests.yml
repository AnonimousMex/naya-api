name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Ejecutar tests diariamente a las 3 AM UTC
    - cron: '0 3 * * *'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: naya_test
          POSTGRES_USER: naya
          POSTGRES_PASSWORD: naya123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'e2e-tests/package-lock.json'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Start Nayá API
        run: |
          # Ejecutar en background
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          # Esperar a que la API esté disponible
          for i in {1..30}; do
            curl -f http://localhost:8000/ && break
            sleep 1
          done
        env:
          DB_USER: naya
          DB_PASSWORD: naya123
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: naya_test
          JWT_SECRET_KEY: test-secret-key
          JWT_ALGORITHM: HS256
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SMTP_SERVER: smtp.mailtrap.io
          SMTP_PORT: 465
          SMTP_USERNAME: test@example.com
          SMTP_PASSWORD: test

      - name: Install E2E test dependencies
        working-directory: ./e2e-tests
        run: npm ci

      - name: Install Playwright
        working-directory: ./e2e-tests
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: ./e2e-tests
        run: npm test -- --reporter=json --reporter=junit
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: e2e-tests/test-results/
          retention-days: 7

      - name: Upload playwright report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: e2e-tests/playwright-report/
          retention-days: 7

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('e2e-tests/test-results/results.json', 'utf8'));
            const stats = results.stats;
            const comment = `## 🧪 E2E Test Results\n\n\u2705 **${stats.expected}** tests passed\n\u274c **${stats.unexpected}** tests failed\n\u23ed\ufe0f **${stats.skipped}** tests skipped\n\n**Duration**: ${(stats.duration / 1000).toFixed(2)}s\n\n[View detailed report](https://github.com/\${{ github.repository }}/actions/runs/\${{ github.run_id }})`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Test summary
        if: always()
        run: |
          if [ -f e2e-tests/test-results/results.json ]; then
            node -e "const r = require('./e2e-tests/test-results/results.json'); console.log('\\n=== TEST SUMMARY ==='); console.log('Passed:', r.stats.expected); console.log('Failed:', r.stats.unexpected); console.log('Skipped:', r.stats.skipped); console.log('Duration:', (r.stats.duration / 1000).toFixed(2), 's');"
          fi