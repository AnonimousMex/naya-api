name: E2E Tests\n\non:\n  push:\n    branches: [main, develop]\n  pull_request:\n    branches: [main, develop]\n  schedule:\n    # Ejecutar tests diariamente a las 3 AM UTC\n    - cron: '0 3 * * *'\n\njobs:\n  test:\n    timeout-minutes: 60\n    runs-on: ubuntu-latest\n\n    services:\n      postgres:\n        image: postgres:15\n        env:\n          POSTGRES_DB: naya_test\n          POSTGRES_USER: naya\n          POSTGRES_PASSWORD: naya123\n        options: >-\n          --health-cmd pg_isready\n          --health-interval 10s\n          --health-timeout 5s\n          --health-retries 5\n        ports:\n          - 5432:5432\n\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v4\n\n      - name: Set up Node.js\n        uses: actions/setup-node@v4\n        with:\n          node-version: '18'\n          cache: 'npm'\n          cache-dependency-path: 'e2e-tests/package-lock.json'\n\n      - name: Set up Python\n        uses: actions/setup-python@v4\n        with:\n          python-version: '3.11'\n          cache: 'pip'\n\n      - name: Install backend dependencies\n        run: pip install -r requirements.txt\n\n      - name: Start Nayá API\n        run: |\n          # Ejecutar en background\n          uvicorn app.main:app --host 0.0.0.0 --port 8000 &\n          # Esperar a que la API esté disponible\n          for i in {1..30}; do\n            curl -f http://localhost:8000/ && break\n            sleep 1\n          done\n        env:\n          DB_USER: naya\n          DB_PASSWORD: naya123\n          DB_HOST: localhost\n          DB_PORT: 5432\n          DB_NAME: naya_test\n          JWT_SECRET_KEY: test-secret-key\n          JWT_ALGORITHM: HS256\n          REDIS_HOST: localhost\n          REDIS_PORT: 6379\n          SMTP_SERVER: smtp.mailtrap.io\n          SMTP_PORT: 465\n          SMTP_USERNAME: test@example.com\n          SMTP_PASSWORD: test\n\n      - name: Install E2E test dependencies\n        working-directory: ./e2e-tests\n        run: npm ci\n\n      - name: Install Playwright\n        working-directory: ./e2e-tests\n        run: npx playwright install --with-deps\n\n      - name: Run E2E tests\n        working-directory: ./e2e-tests\n        run: npm test -- --reporter=json --reporter=junit\n        continue-on-error: true\n\n      - name: Upload test results\n        if: always()\n        uses: actions/upload-artifact@v3\n        with:\n          name: test-results\n          path: e2e-tests/test-results/\n          retention-days: 7\n\n      - name: Upload playwright report\n        if: always()\n        uses: actions/upload-artifact@v3\n        with:\n          name: playwright-report\n          path: e2e-tests/playwright-report/\n          retention-days: 7\n\n      - name: Comment PR with results\n        if: github.event_name == 'pull_request'\n        uses: actions/github-script@v7\n        with:\n          script: |\n            const fs = require('fs');\n            const results = JSON.parse(fs.readFileSync('e2e-tests/test-results/results.json', 'utf8'));\n            const stats = results.stats;\n            const comment = `## 🧪 E2E Test Results\n\n✅ **${stats.expected}** tests passed\n❌ **${stats.unexpected}** tests failed\n⏭️ **${stats.skipped}** tests skipped\n\n**Duration**: ${(stats.duration / 1000).toFixed(2)}s\n\n[View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;\n            github.rest.issues.createComment({\n              issue_number: context.issue.number,\n              owner: context.repo.owner,\n              repo: context.repo.repo,\n              body: comment\n            });\n\n      - name: Test summary\n        if: always()\n        run: |\n          if [ -f e2e-tests/test-results/results.json ]; then\n            node -e \"const r = require('./e2e-tests/test-results/results.json'); console.log('\\n=== TEST SUMMARY ==='); console.log('Passed:', r.stats.expected); console.log('Failed:', r.stats.unexpected); console.log('Skipped:', r.stats.skipped); console.log('Duration:', (r.stats.duration / 1000).toFixed(2), 's');\"\n          fi\n