name: 🧪 CI - Backend Tests

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        # Variables mínimas para que pydantic-settings cargue Settings.
        # NO son secretos reales — solo dummies para que `from app.core.settings`
        # no falle al importarse durante la suite.
        env:
          PROJECT_NAME: naya-api
          API_V1: /api/v1
          DB_USER: postgres
          DB_PASSWORD: ci
          DB_NAME: naya
          DB_HOST: localhost
          DB_PORT: 5432
          JWT_SECRET_KEY: ci-test-secret-please-change-in-prod-32bytes
          JWT_ALGORITHM: HS256
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SMTP_SERVER: smtp.example.com
          SMTP_PORT: 587
          SMTP_USERNAME: ci@example.com
          SMTP_PASSWORD: ci-pass
          # Sentry desactivado en CI (DSN vacío = no-op)
          SENTRY_DSN: ""
          SENTRY_ENVIRONMENT: ci
        run: pytest tests/ -v --tb=short

      - name: Test summary
        if: always()
        run: |
          echo "### Resultado de tests" >> $GITHUB_STEP_SUMMARY
          echo "- Suite: tests/" >> $GITHUB_STEP_SUMMARY
          echo "- Python: 3.11" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
