name: 🐳 Build & Publish Docker

on:
  # Se dispara en push directo a las branches publicables.
  # `stage` actúa como integration branch: lo que cae acá se publica
  # como imagen "stage" de pre-producción.
  push:
    branches: ["main", "master", "stage"]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ---------------------------------------------------------------------
  # 1. Build & Push — construye y publica a GHCR
  # ---------------------------------------------------------------------
  build-and-push:
    name: 🏗️ Build & push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      image-ref: ${{ steps.image.outputs.ref }}
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image ref
        # GHCR almacena nombres en lowercase. Tools como trivy/syft y `docker pull`
        # pueden fallar si el ref preserva el case original del repo (ej.
        # "AnonimousMex/naya-api" → debe ser "anonimousmex/naya-api").
        id: image
        run: |
          echo "ref=${REGISTRY}/$(echo ${IMAGE_NAME} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Naya API
            org.opencontainers.image.description=FastAPI backend para Naya
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ---------------------------------------------------------------------
  # 2. Vulnerability scan — Trivy sobre la imagen publicada
  # ---------------------------------------------------------------------
  vulnerability-scan:
    name: 🛡️ Vulnerability scan
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Advisory: si trivy detecta CVEs no fallamos el release, pero queda
    # registrado en el summary y en GitHub Security tab.
    continue-on-error: true
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Trivy scanner (table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.image-ref }}:${{ needs.build-and-push.outputs.image-tag }}
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
      - name: Run Trivy (SARIF for security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.image-ref }}:${{ needs.build-and-push.outputs.image-tag }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  # ---------------------------------------------------------------------
  # 3. SBOM — Bill of Materials de la imagen (qué paquetes contiene)
  # ---------------------------------------------------------------------
  generate-sbom:
    name: 📋 Generate SBOM
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true # advisory, no bloquea el release
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build-and-push.outputs.image-ref }}:${{ needs.build-and-push.outputs.image-tag }}
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 30

  # ---------------------------------------------------------------------
  # 4. Smoke test — bota la imagen real y verifica que /metrics responde
  # ---------------------------------------------------------------------
  smoke-test:
    name: 💨 Smoke test
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull image
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image-ref }}:${{ needs.build-and-push.outputs.image-tag }}"
          echo "Pulling $IMAGE"
          docker pull "$IMAGE"
      - name: Run container
        # Variables dummy. La conexión a DB va a fallar dentro del lifespan
        # pero el código tolera ese fallo y la app sigue lista para responder
        # a /metrics — eso es exactamente lo que validamos en smoke.
        run: |
          docker run -d --name smoke -p 8000:8000 \
            -e PROJECT_NAME=naya-api \
            -e API_V1=/api/v1 \
            -e DB_USER=u -e DB_PASSWORD=p -e DB_NAME=n \
            -e DB_HOST=nonexistent.invalid -e DB_PORT=5432 \
            -e JWT_SECRET_KEY=smoke-test-key-32bytes-please-change \
            -e JWT_ALGORITHM=HS256 \
            -e REDIS_HOST=nonexistent.invalid -e REDIS_PORT=6379 \
            -e SMTP_SERVER=s -e SMTP_PORT=587 \
            -e SMTP_USERNAME=u -e SMTP_PASSWORD=p \
            -e SENTRY_DSN= -e SENTRY_ENVIRONMENT=ci \
            ${{ needs.build-and-push.outputs.image-ref }}:${{ needs.build-and-push.outputs.image-tag }}
          echo "Container started, waiting for boot..."
      - name: Wait for boot (90s max)
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8000/metrics > /dev/null 2>&1; then
              echo "✓ App boot OK after ${i}s"
              exit 0
            fi
            if [ $((i % 10)) -eq 0 ]; then
              echo "  ...waiting (${i}s elapsed) — container status:"
              docker ps --filter name=smoke --format "{{.Status}}"
            fi
            sleep 1
          done
          echo "✗ App no respondió en 90s — container logs:"
          docker logs smoke
          exit 1
      - name: Verify metrics endpoint
        run: |
          echo "## Sample of metrics emitted:"
          curl -s http://localhost:8000/metrics | grep -E "^naya_|^http_requests" | head -15
          echo ""
          echo "## /version endpoint (if branch has it):"
          curl -s http://localhost:8000/version || echo "(endpoint not present in this branch)"
      - name: Show container logs
        if: always()
        run: |
          echo "## Final container logs (últimas 50 líneas):"
          docker logs --tail 50 smoke || true
      - name: Cleanup
        if: always()
        run: docker rm -f smoke || true

  # ---------------------------------------------------------------------
  # 5. Release summary — agrega resultados de las 4 fases anteriores
  # ---------------------------------------------------------------------
  release-summary:
    name: 📦 Release summary
    needs: [build-and-push, vulnerability-scan, generate-sbom, smoke-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        run: |
          echo "# 🐳 Naya API — Release Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Fase | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build & Push       | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ Vulnerability scan  | ${{ needs.vulnerability-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 SBOM                | ${{ needs.generate-sbom.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 💨 Smoke test          | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚀 Imagen publicada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ needs.build-and-push.outputs.image-ref }}:${{ needs.build-and-push.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest**: \`${{ needs.build-and-push.outputs.image-digest }}\`" >> $GITHUB_STEP_SUMMARY
