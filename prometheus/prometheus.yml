global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: naya-api

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: naya-fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["fastapi:8000"]
        labels:
          service: naya-api
          env: local
